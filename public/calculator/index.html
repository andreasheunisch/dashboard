<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator — Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
    }

    .back-link {
      color: #6366f1;
      text-decoration: none;
      font-size: 0.875rem;
      align-self: center;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .calculator {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 280px;
    }

    /* Task 1.2: .display updated for <input> — strip browser chrome, fill container */
    .display {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: #e2e8f0;
      overflow: hidden;
      white-space: nowrap;
      min-height: 3.5rem;
      text-align: right;
      outline: none;
      width: 100%;
    }

    /* Task 1.3: caret visibility — hide by default, show only when display is focused */
    #display { caret-color: transparent; }
    #display:focus { caret-color: auto; }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 0.875rem 0;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      transition: filter 0.1s;
    }

    button:active {
      filter: brightness(1.25);
    }

    .btn-digit {
      background: #252836;
      color: #e2e8f0;
    }

    .btn-digit:hover {
      background: #2d3148;
    }

    .btn-operator {
      background: #3730a3;
      color: #c7d2fe;
    }

    .btn-operator:hover {
      background: #4338ca;
    }

    .btn-equals {
      background: #6366f1;
      color: #fff;
    }

    .btn-equals:hover {
      background: #4f46e5;
    }

    .btn-clear {
      background: #7f1d1d;
      color: #fca5a5;
    }

    .btn-clear:hover {
      background: #991b1b;
    }

    .span-two {
      grid-column: span 2;
    }

    .btn-memory {
      background: #374151;
      color: #9ca3af;
    }

    .btn-memory:hover {
      background: #4b5563;
    }

    .calculator-header {
      display: flex;
      justify-content: flex-end;
    }

    #btn-sci {
      background: #252836;
      color: #9ca3af;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      cursor: pointer;
    }

    #btn-sci:hover {
      background: #2d3148;
    }

    .sci-panel {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.35rem;
    }

    .sci-panel[hidden] {
      display: none;
    }

    .sci-panel.row-4 {
      grid-template-columns: repeat(5, 1fr);
    }

    #angle-unit-label {
      display: none;
      text-align: right;
      font-size: 0.7rem;
      color: #6b7280;
      padding: 0 0.25rem;
    }

    .btn-sci-fn {
      background: #1e3a4a;
      color: #67c5d0;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 0;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: filter 0.1s;
    }

    .btn-sci-fn:hover {
      background: #264d5e;
    }

    .btn-sci-fn:active {
      filter: brightness(1.25);
    }
  </style>
</head>
<body>
  <a class="back-link" href="/">← Back to Dashboard</a>

  <div class="calculator">
    <div class="calculator-header">
      <button id="btn-sci" onclick="calc.toggleSci()">[sci]</button>
    </div>
    <!-- Task 1.1: replaced <div> with <input> for native cursor positioning -->
    <input type="text" class="display" id="display" value="0" spellcheck="false" autocomplete="off">
    <span id="angle-unit-label">RAD</span>
    <div class="sci-panel" id="sci-panel" hidden>
      <button class="btn-sci-fn" onclick="calc.applyUnary(function(x){return Math.sin(calc.toRadians(x))})">sin</button>
      <button class="btn-sci-fn" onclick="calc.applyUnary(function(x){return Math.cos(calc.toRadians(x))})">cos</button>
      <button class="btn-sci-fn" onclick="calc.applyUnary(function(x){return Math.tan(calc.toRadians(x))})">tan</button>
      <button class="btn-sci-fn" onclick="calc.applyUnary(function(x){return calc.fromRadians(Math.asin(x))})">arcsin</button>
      <button class="btn-sci-fn" onclick="calc.applyUnary(function(x){return calc.fromRadians(Math.acos(x))})">arccos</button>
      <button class="btn-sci-fn" onclick="calc.applyUnary(function(x){return calc.fromRadians(Math.atan(x))})">arctan</button>
      <button class="btn-sci-fn" onclick="calc.applyUnary(function(x){return x===0?NaN:1/x})">1/x</button>
      <button class="btn-sci-fn" onclick="calc.applyUnary(function(x){return x<=0?NaN:Math.log10(x)})">log</button>
      <button class="btn-sci-fn" onclick="calc.applyUnary(function(x){return x<=0?NaN:Math.log(x)})">ln</button>
      <button class="btn-sci-fn" onclick="calc.applyUnary(function(x){return x<0?NaN:Math.sqrt(x)})">√</button>
      <button class="btn-sci-fn" onclick="calc.applyUnary(function(x){return x*x})">x²</button>
      <button class="btn-sci-fn" onclick="calc.powerOp()">xʸ</button>
      <button class="btn-sci-fn" onclick="calc.insertConstant(Math.PI)">π</button>
      <button class="btn-sci-fn" onclick="calc.insertConstant(Math.E)">e</button>
    </div>
    <div class="sci-panel row-4" id="sci-panel-2" hidden>
      <button class="btn-sci-fn" onclick="calc.negate()">±</button>
      <button class="btn-sci-fn" onclick="calc.applyUnary(function(x){return x/100})">%</button>
      <button class="btn-sci-fn" onclick="calc.openParen()">(</button>
      <button class="btn-sci-fn" onclick="calc.closeParen()">)</button>
      <button class="btn-sci-fn" onclick="calc.toggleAngleUnit()">RAD</button>
    </div>
    <div class="buttons">
      <button class="btn-memory" onclick="calc.memoryClear()">MC</button>
      <button class="btn-memory" onclick="calc.memoryRecall()">MR</button>
      <button class="btn-memory" onclick="calc.memoryAdd()">M+</button>
      <button class="btn-memory" style="visibility: hidden;"></button>

      <button class="btn-clear span-two" onclick="calc.clear()">C</button>
      <button class="btn-operator" onclick="calc.inputOperator('÷')">÷</button>
      <button class="btn-operator" onclick="calc.inputOperator('×')">×</button>

      <button class="btn-digit" onclick="calc.inputDigit('7')">7</button>
      <button class="btn-digit" onclick="calc.inputDigit('8')">8</button>
      <button class="btn-digit" onclick="calc.inputDigit('9')">9</button>
      <button class="btn-operator" onclick="calc.inputOperator('−')">−</button>

      <button class="btn-digit" onclick="calc.inputDigit('4')">4</button>
      <button class="btn-digit" onclick="calc.inputDigit('5')">5</button>
      <button class="btn-digit" onclick="calc.inputDigit('6')">6</button>
      <button class="btn-operator" onclick="calc.inputOperator('+')">+</button>

      <button class="btn-digit" onclick="calc.inputDigit('1')">1</button>
      <button class="btn-digit" onclick="calc.inputDigit('2')">2</button>
      <button class="btn-digit" onclick="calc.inputDigit('3')">3</button>
      <button class="btn-equals" style="grid-row: span 2;" onclick="calc.evaluate()">=</button>

      <button class="btn-digit span-two" onclick="calc.inputDigit('0')">0</button>
      <button class="btn-digit" onclick="calc.inputDecimal()">.</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');

    function formatDisplay(value) {
      if (value === 'Error' || value === '0') return value;
      const n = parseFloat(value);
      if (!isFinite(n) || isNaN(n)) return 'Error';
      if (n === 0) return '0';
      const abs = Math.abs(n);
      if (value.length <= 12 && abs >= 1e-6 && abs < 1e12) return value;
      for (let p = 10; p >= 0; p--) {
        let s = n.toExponential(p);
        s = s.replace(/\.?0+(e)/, '$1');
        s = s.replace('e', 'E');
        s = s.replace(/E(\d)/, 'E+$1');
        if (s.endsWith('E+0')) {
          const decimals = 12 - 2 - (n < 0 ? 1 : 0);
          return n.toFixed(decimals).replace(/\.?0+$/, '');
        }
        if (s.length <= 12) return s;
      }
      let s = n.toExponential(0);
      s = s.replace('e', 'E');
      s = s.replace(/E(\d)/, 'E+$1');
      return s;
    }

    // Task 4.1: returns all focusable (visible, enabled) buttons
    function getFocusableButtons() {
      return Array.from(document.querySelectorAll('button')).filter(function(btn) {
        if (btn.disabled) return false;
        if (btn.hidden) return false;
        const style = window.getComputedStyle(btn);
        if (style.visibility === 'hidden') return false;
        if (style.display === 'none') return false;
        return true;
      });
    }

    // Task 4.2: spatially navigate buttons in the given arrow direction
    function navigateButtons(direction) {
      const active = document.activeElement;
      const activeRect = active.getBoundingClientRect();
      const cx = (activeRect.left + activeRect.right) / 2;
      const cy = (activeRect.top + activeRect.bottom) / 2;

      const buttons = getFocusableButtons();
      const candidates = buttons.filter(function(btn) {
        if (btn === active) return false;
        const r = btn.getBoundingClientRect();
        const bx = (r.left + r.right) / 2;
        const by = (r.top + r.bottom) / 2;
        if (direction === 'ArrowRight') return bx > cx;
        if (direction === 'ArrowLeft')  return bx < cx;
        if (direction === 'ArrowDown')  return by > cy;
        if (direction === 'ArrowUp')    return by < cy;
        return false;
      });

      if (candidates.length === 0) return;

      let best = null;
      let bestDist = Infinity;
      candidates.forEach(function(btn) {
        const r = btn.getBoundingClientRect();
        const bx = (r.left + r.right) / 2;
        const by = (r.top + r.bottom) / 2;
        const dist = Math.sqrt((bx - cx) * (bx - cx) + (by - cy) * (by - cy));
        if (dist < bestDist) {
          bestDist = dist;
          best = btn;
        }
      });

      if (best) best.focus();
    }

    const calc = {
      currentInput: '0',
      previousInput: null,
      operator: null,
      waitingForOperand: false,
      memoryValue: 0,
      parenDepth: 0,
      contextStack: [],
      angleUnit: 'RAD',

      toRadians(x) {
        switch (this.angleUnit) {
          case 'DEG': return x * Math.PI / 180;
          case 'GON': return x * Math.PI / 200;
          default: return x;
        }
      },

      fromRadians(x) {
        switch (this.angleUnit) {
          case 'DEG': return x * 180 / Math.PI;
          case 'GON': return x * 200 / Math.PI;
          default: return x;
        }
      },

      toggleAngleUnit() {
        const cycle = { RAD: 'GON', GON: 'DEG', DEG: 'RAD' };
        this.angleUnit = cycle[this.angleUnit];
        document.getElementById('angle-unit-label').textContent = this.angleUnit;
        document.querySelector('#sci-panel-2 button:last-child').textContent = this.angleUnit;
      },

      roundResult(n) {
        if (!isFinite(n)) return n;
        const rounded = parseFloat(n.toPrecision(10));
        if (Math.abs(rounded) < 1e-10) return 0;
        return rounded;
      },

      // Task 1.4: use display.value instead of display.textContent;
      // preserve cursor position when display is focused
      updateDisplay() {
        if (display === document.activeElement) {
          const start = display.selectionStart;
          const end = display.selectionEnd;
          display.value = formatDisplay(this.currentInput);
          display.setSelectionRange(start, end);
        } else {
          display.value = formatDisplay(this.currentInput);
        }
      },

      // Task 2.2: cursor-aware digit insertion when display is focused
      inputDigit(digit) {
        if (this.waitingForOperand) {
          this.currentInput = digit;
          this.waitingForOperand = false;
          this.updateDisplay();
          return;
        }
        if (display === document.activeElement && display.selectionStart === display.selectionEnd) {
          if (this.currentInput.length >= 12) return;
          const pos = display.selectionStart;
          if (this.currentInput === '0') {
            this.currentInput = digit;
            this.updateDisplay();
            display.setSelectionRange(1, 1);
          } else {
            this.currentInput = this.currentInput.slice(0, pos) + digit + this.currentInput.slice(pos);
            this.updateDisplay();
            display.setSelectionRange(pos + 1, pos + 1);
          }
          return;
        }
        if (this.currentInput.length >= 12) return;
        this.currentInput = this.currentInput === '0'
          ? digit
          : this.currentInput + digit;
        this.updateDisplay();
      },

      // Task 2.3: cursor-aware decimal insertion when display is focused
      inputDecimal() {
        if (this.waitingForOperand) {
          this.currentInput = '0.';
          this.waitingForOperand = false;
          this.updateDisplay();
          return;
        }
        if (display === document.activeElement) {
          if (this.currentInput.includes('.')) return;
          const pos = display.selectionStart;
          if (this.currentInput.length >= 12) return;
          this.currentInput = this.currentInput.slice(0, pos) + '.' + this.currentInput.slice(pos);
          this.updateDisplay();
          display.setSelectionRange(pos + 1, pos + 1);
          return;
        }
        if (!this.currentInput.includes('.')) {
          if (this.currentInput.length >= 12) return;
          this.currentInput += '.';
          this.updateDisplay();
        }
      },

      inputOperator(op) {
        // If there's a pending operation, evaluate it first
        if (this.operator && !this.waitingForOperand) {
          this.evaluate();
          if (this.currentInput === 'Error') return;
        }
        this.previousInput = this.currentInput;
        this.operator = op;
        this.waitingForOperand = true;
      },

      evaluate() {
        if (this.operator === null || this.previousInput === null) return;

        const a = parseFloat(this.previousInput);
        const b = parseFloat(this.currentInput);
        let result;

        switch (this.operator) {
          case '+': result = a + b; break;
          case '−': result = a - b; break;
          case '×': result = a * b; break;
          case '÷':
            if (b === 0) {
              this.currentInput = 'Error';
              this.operator = null;
              this.previousInput = null;
              this.waitingForOperand = false;
              this.updateDisplay();
              return;
            }
            result = a / b;
            break;
          case 'pow': result = Math.pow(a, b); break;
          default: return;
        }

        // Avoid floating point noise for simple cases
        this.currentInput = parseFloat(result.toPrecision(12)).toString();
        this.operator = null;
        this.previousInput = null;
        this.waitingForOperand = true;
        this.updateDisplay();
      },

      clear() {
        this.currentInput = '0';
        this.previousInput = null;
        this.operator = null;
        this.waitingForOperand = false;
        this.parenDepth = 0;
        this.contextStack = [];
        this.updateDisplay();
      },

      memoryAdd() {
        if (this.currentInput === 'Error') return;
        this.memoryValue += parseFloat(this.currentInput);
        this.waitingForOperand = true;
      },

      memoryRecall() {
        this.currentInput = this.memoryValue.toString();
        this.waitingForOperand = false;
        this.updateDisplay();
      },

      memoryClear() {
        this.memoryValue = 0;
      },

      applyUnary(fn) {
        if (this.currentInput === 'Error') return;
        const x = parseFloat(this.currentInput);
        const result = fn(x);
        if (isNaN(result) || !isFinite(result)) {
          this.currentInput = 'Error';
        } else {
          this.currentInput = this.roundResult(result).toString();
        }
        this.waitingForOperand = true;
        this.updateDisplay();
      },

      negate() {
        if (this.currentInput === 'Error' || this.currentInput === '0') return;
        if (this.currentInput.startsWith('-')) {
          this.currentInput = this.currentInput.slice(1);
        } else {
          this.currentInput = '-' + this.currentInput;
        }
        this.updateDisplay();
      },

      insertConstant(val) {
        this.currentInput = val.toString();
        this.waitingForOperand = true;
        this.updateDisplay();
      },

      powerOp() {
        if (this.operator && !this.waitingForOperand) {
          this.evaluate();
          if (this.currentInput === 'Error') return;
        }
        this.previousInput = this.currentInput;
        this.operator = 'pow';
        this.waitingForOperand = true;
      },

      openParen() {
        this.contextStack.push({
          previousInput: this.previousInput,
          operator: this.operator,
        });
        this.parenDepth++;
        this.currentInput = '0';
        this.waitingForOperand = false;
        this.previousInput = null;
        this.operator = null;
        this.updateDisplay();
      },

      closeParen() {
        if (this.parenDepth === 0) {
          this.currentInput = 'Error';
          this.updateDisplay();
          return;
        }
        // If there's a pending operation inside the parens, resolve it
        if (this.operator && this.previousInput !== null) {
          const a = parseFloat(this.previousInput);
          const b = parseFloat(this.currentInput);
          let result;
          switch (this.operator) {
            case '+': result = a + b; break;
            case '−': result = a - b; break;
            case '×': result = a * b; break;
            case '÷':
              if (b === 0) {
                this.currentInput = 'Error';
                this.operator = null;
                this.previousInput = null;
                this.waitingForOperand = false;
                this.parenDepth--;
                this.contextStack.pop();
                this.updateDisplay();
                return;
              }
              result = a / b;
              break;
            case 'pow': result = Math.pow(a, b); break;
            default: result = b;
          }
          if (isNaN(result) || !isFinite(result)) {
            this.currentInput = 'Error';
            this.operator = null;
            this.previousInput = null;
            this.waitingForOperand = false;
            this.parenDepth--;
            this.contextStack.pop();
            this.updateDisplay();
            return;
          }
          this.currentInput = this.roundResult(result).toString();
          this.operator = null;
          this.previousInput = null;
        }
        // Restore outer context so the paren result combines with the outer expression
        const outer = this.contextStack.pop();
        if (outer && outer.operator !== null) {
          this.previousInput = outer.previousInput;
          this.operator = outer.operator;
        }
        this.parenDepth--;
        this.waitingForOperand = false;
        this.updateDisplay();
      },

      toggleSci() {
        const panel = document.getElementById('sci-panel');
        const panel2 = document.getElementById('sci-panel-2');
        const btn = document.getElementById('btn-sci');
        const label = document.getElementById('angle-unit-label');
        const isHidden = panel.hidden;
        panel.hidden = !isHidden;
        panel2.hidden = !isHidden;
        label.style.display = isHidden ? 'block' : 'none';
        if (isHidden) label.textContent = this.angleUnit;
        btn.textContent = isHidden ? '[basic]' : '[sci]';
      },

      // Task 2.1: start a new number entry from a button-focus state
      startNewEntry(digit) {
        this.waitingForOperand = true;
        this.inputDigit(digit);
        display.focus();
      },
    };

    // Task 1.5: prevent direct user edits to the display input;
    // always re-sync value from calc state
    display.addEventListener('input', function(e) {
      e.preventDefault();
      display.value = formatDisplay(calc.currentInput);
    });

    // Tasks 3.1–3.5, 4.3–4.5: revised keydown handler with per-key routing
    document.addEventListener('keydown', function(e) {
      const ae = document.activeElement;
      const tag = ae ? ae.tagName : '';

      // Task 3.1: suppress only for non-calculator form inputs (not the display)
      if ((tag === 'INPUT' && ae !== display) || tag === 'TEXTAREA' || tag === 'SELECT') return;

      // Task 4.4 / 4.5: when display is focused, handle arrow keys
      if (ae === display) {
        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
          // Task 4.5: ArrowUp/Down from display → navigate to nearest button
          navigateButtons(e.key);
          e.preventDefault();
          return;
        }
        // Task 4.4: ArrowLeft/ArrowRight — do NOT intercept; allow native cursor movement
      }

      // Tasks 3.2–3.5 / 4.3: routing when a button is focused
      if (tag === 'BUTTON') {
        // Task 3.2: digit key — start new entry (focus returns to display)
        if (e.key >= '0' && e.key <= '9') {
          e.preventDefault();
          calc.startNewEntry(e.key);
          return;
        }
        // Task 3.3: decimal key — start new entry with '.'
        if (e.key === '.') {
          e.preventDefault();
          calc.startNewEntry('.');
          return;
        }
        // Task 3.4: = or Enter — let the focused button's own click fire; skip global handler
        if (e.key === '=' || e.key === 'Enter') {
          return;
        }
        // Task 4.3: arrow keys — spatial navigation between buttons
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' ||
            e.key === 'ArrowUp'   || e.key === 'ArrowDown') {
          navigateButtons(e.key);
          e.preventDefault();
          return;
        }
        // Task 3.5: operator keys — fall through to global operator handling below
      }

      // Global digit/operator handling (display focused, or button focused with operator key)
      if (e.key >= '0' && e.key <= '9') {
        e.preventDefault();
        calc.inputDigit(e.key);
      } else if (e.key === '.') {
        e.preventDefault();
        calc.inputDecimal();
      } else if (e.key === '+') {
        calc.inputOperator('+');
      } else if (e.key === '-') {
        calc.inputOperator('\u2212');
      } else if (e.key === '*') {
        calc.inputOperator('\u00d7');
      } else if (e.key === '/') {
        e.preventDefault();
        calc.inputOperator('\u00f7');
      } else if (e.key === '=' || e.key === 'Enter') {
        calc.evaluate();
      }
    });
  </script>
</body>
</html>
