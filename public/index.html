<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 0.5rem;
      color: #64748b;
      font-size: 1rem;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 640px;
    }

    .app-card {
      display: block;
      text-decoration: none;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 1.5rem;
      transition: border-color 0.15s, transform 0.15s;
    }

    .app-card:hover {
      border-color: #6366f1;
      transform: translateY(-2px);
    }

    .app-card .icon {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
    }

    .app-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 0.25rem;
    }

    .app-card p {
      font-size: 0.8125rem;
      color: #64748b;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dashboard</h1>
    <p>Select an app to get started.</p>
  </header>

  <nav>
    <a class="app-card" href="/calculator">
      <div class="icon">🧮</div>
      <h2>Calculator</h2>
      <p>Basic arithmetic with a clean interface.</p>
    </a>
  </nav>
</body>
</html>
